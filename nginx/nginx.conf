upstream nextjs {
    server client:3000;
}

upstream nestjs {
    server backend:4000;
}

upstream fastapi {
    server python:8000;
}

server {
    listen 80;
    server_name localhost;

    # ── Next.js Frontend ──────────────────────────────────
    location / {
        proxy_pass         http://nextjs/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── NestJS API ────────────────────────────────────────
    location /api/nest/ {
        proxy_pass         http://nestjs/api/nest/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── FastAPI ───────────────────────────────────────────
    location /api/python/ {
        proxy_pass         http://fastapi/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FastAPI Docs ──────────────────────────────────────
    location /api/python/docs {
        proxy_pass         http://fastapi/docs;
        proxy_set_header   Host $host;
    }

    location /api/python/openapi.json {
        proxy_pass         http://fastapi/openapi.json;
        proxy_set_header   Host $host;
    }

    # ── Health Checks ─────────────────────────────────────
    location /health/nest {
        proxy_pass         http://nestjs/api/nest/health;
        proxy_set_header   Host $host;
    }

    location /health/python {
        proxy_pass         http://fastapi/health/;
        proxy_set_header   Host $host;
    }
}