# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint → Type Check → Test → Build
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ───
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Setup Node ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── Install ───
      - name: Install dependencies
        run: npm ci

      # ─── Lint ───
      - name: Lint
        run: npm run lint

      # ─── Type Check ───
      - name: Type check
        run: npx tsc --noEmit

      # ─── Test ───
      - name: Run tests
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test

      # ─── Build ───
      - name: Build
        run: npm run build