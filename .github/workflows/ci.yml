# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io/soft-sensor-project

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'apps/client/**'
              - '.github/workflows/ci.yml'

  ci:
    name: CI — Lint · Type · Test · Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      # ─── Checkout ───
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # ─── Setup Node ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # ─── Create empty .env so dotenvx doesn't crash ───
      - name: Create .env
        run: touch .env

      # ─── Install ───
      - name: Install dependencies
        run: pnpm install

      # ─── Lint ───
      # - name: Lint
      #   run: pnpm lint

      # ─── Type Check ───
      - name: Type check
        run: pnpm check-types

      # ─── Test ───
      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      # ─── Build ───
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
