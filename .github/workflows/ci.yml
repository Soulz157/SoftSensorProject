# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint → Type Check → Test → Build
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ───
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      # ─── Setup Node ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # ─── Install ───
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Lint ───
      - name: Lint
        run: pnpm lint

      # ─── Type Check ───
      - name: Type check
        run: pnpm check-types

      # ─── Test ───
      - name: Run tests
        run: pnpm test:ci
        env:
          NODE_ENV: test

      # ─── Build ───
      - name: Build
        run: pnpm build
